# verified-feeds — Anchor 0.31 configuration (standalone example).
#
# The program id below matches `declare_id!` in
# `programs/verified-feeds/src/lib.rs`. Replace both with the output of
# `anchor keys list` before any real deploy.

[features]
seeds = false
skip-lint = false
resolution = true

[programs.localnet]
verified_feeds = "BgUeCx3tUk1hrKSqfGMzo4WwtUKKphMn3b9Xny2Kdjnb"

[programs.mainnet]
verified_feeds = "BgUeCx3tUk1hrKSqfGMzo4WwtUKKphMn3b9Xny2Kdjnb"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
