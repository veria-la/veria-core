# verified-feeds — example dApp workspace.
#
# A standalone Anchor workspace (intentionally NOT a member of the root
# veria-core workspace) so it can pull the published `veria-verifier` crate as
# a git dependency and be forked/built in isolation by anyone reading the
# reference code. Mirrors the layout of `packages/verifier-program`.

[workspace]
resolver = "2"
members = ["programs/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["VERIA contributors"]
repository = "https://github.com/veria-la/veria-core"
homepage = "https://veria.fun"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

[profile.dev]
opt-level = 1
overflow-checks = true
