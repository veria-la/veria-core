# ml-gated-mint — Anchor 0.31 configuration (standalone example).
#
# The program id below matches `declare_id!` in
# `programs/ml-gated-mint/src/lib.rs`. Replace both with the output of
# `anchor keys list` before any real deploy.

[features]
seeds = false
skip-lint = false
resolution = true

[programs.localnet]
ml_gated_mint = "2g9TWn1PHd5uT8k5NfzUqJFdLkfhj3vDoNfRMFZg4VTA"

[programs.mainnet]
ml_gated_mint = "2g9TWn1PHd5uT8k5NfzUqJFdLkfhj3vDoNfRMFZg4VTA"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
